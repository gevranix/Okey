<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Okey Yazboz</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --bg:#0d1018;--bg2:#131724;--bg3:#181f30;
  --card:#161c2a;--card2:#1c2438;--card3:#222c45;
  --border:#232d45;--border2:#2e3d62;--border3:#3a4e7a;
  --accent:#4a8fff;--accent2:#6fa8ff;--accent3:#98c4ff;
  --gold:#f0c040;--gold2:#f8d568;--gold3:#ffe090;
  --green:#28c870;--red:#f05050;--red2:#ff7070;
  --text:#e8eaf0;--text2:#b8bdd0;--muted:#606880;--muted2:#8890a8;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(74,143,255,.08),transparent 60%);pointer-events:none;z-index:0;}
.app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1;}
.page{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page.on{display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{padding:calc(var(--safe-top) + 14px) 16px 13px;display:flex;align-items:center;gap:12px;
  background:rgba(13,16,24,.7);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#e09820);border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 2px 12px rgba(240,192,64,.3);}
.hdr-title{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);letter-spacing:.5px;}
.hdr-sub{font-size:11px;color:var(--muted2);margin-top:1px;}
.room-badge{margin-left:auto;background:var(--card2);border:1px solid var(--border2);border-radius:8px;
  padding:5px 11px;font-size:12px;font-weight:800;color:var(--accent2);letter-spacing:2px;cursor:pointer;}

/* ── LOBBY ── */
.lobby{padding:16px 16px 40px;display:flex;flex-direction:column;gap:14px;}
.lobby-hero{text-align:center;padding:20px 0 12px;}
.hero-emoji{font-size:52px;filter:drop-shadow(0 4px 16px rgba(240,192,64,.4));}
.hero-title{font-family:'Cinzel',serif;font-size:24px;color:var(--gold);margin:10px 0 6px;}
.hero-sub{font-size:13px;color:var(--muted2);line-height:1.6;max-width:300px;margin:0 auto;}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;}
.sec-lbl{font-size:10px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:11px;}
.inp{width:100%;padding:13px 15px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:11px;
  color:var(--text);font-size:15px;font-family:'Nunito',sans-serif;outline:none;transition:.2s;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--muted);}
.inp-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.inp-num{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent2);flex-shrink:0;}
.btn{width:100%;padding:15px;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;border:none;transition:.2s;font-family:'Nunito',sans-serif;}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#c88010);color:#1a0e00;letter-spacing:.3px;}
.btn-blue{background:linear-gradient(135deg,var(--accent),#3055cc);color:#fff;}
.btn-ghost{background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);}
.or-sep{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;}
.or-sep::before,.or-sep::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── GAME LAYOUT ── */
.game-body{flex:1;overflow-y:auto;padding:12px 12px 90px;display:flex;flex-direction:column;gap:11px;}
.status-bar{padding:9px 16px;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0;}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);}
.pulse.live{animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.status-writer{color:var(--gold);font-weight:800;}

/* ── SCOREBOARD ── */
.score-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
.score-title{text-align:center;padding:11px;font-size:10px;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:700;}
.score-row{display:grid;grid-template-columns:1fr auto 60px;align-items:center;
  border-bottom:1px solid var(--border);transition:.3s;}
.score-row:last-child{border-bottom:none;}
.score-row.is-writer{background:rgba(240,192,64,.05);}
.score-row.is-bench{opacity:.7;}
.score-row.busted{background:rgba(240,80,80,.06);}
.sc-left{padding:10px 10px 10px 14px;}
.sc-name{font-size:14px;font-weight:700;color:var(--text);}
.sc-badges{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.badge{font-size:9px;letter-spacing:.8px;padding:2px 7px;border-radius:5px;font-weight:700;text-transform:uppercase;}
.b-writer{background:rgba(240,192,64,.15);color:var(--gold2);border:1px solid rgba(240,192,64,.25);}
.b-playing{background:rgba(40,200,112,.12);color:var(--green);border:1px solid rgba(40,200,112,.2);}
.b-bench{background:rgba(96,104,128,.12);color:var(--muted2);border:1px solid var(--border);}
.b-bust{background:rgba(240,80,80,.12);color:var(--red2);border:1px solid rgba(240,80,80,.2);}
.sc-mid{padding:0 6px;color:var(--border2);}
.sc-right{padding:10px 14px 10px 4px;text-align:right;}
.sc-score{font-family:'Cinzel',serif;font-size:22px;font-weight:800;color:var(--accent2);}
.sc-score.red{color:var(--red);}
.sc-score.gold{color:var(--gold);}
.sc-target{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── QUICK ADD ── */
.qa-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;}
.qa-title{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:700;text-align:center;margin-bottom:12px;}
.qa-subtitle{font-size:12px;color:var(--muted2);text-align:center;margin:-8px 0 10px;}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;}
.qa-btn{padding:13px 8px;border-radius:12px;background:var(--bg3);border:1.5px solid var(--border2);
  color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:.18s;font-family:'Nunito',sans-serif;}
.qa-btn:active{transform:scale(.94);}
.qa-btn.sel{border-color:var(--accent);background:rgba(74,143,255,.12);color:var(--accent2);}
.score-row-inp{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.score-row-inp label{font-size:12px;color:var(--muted2);flex-shrink:0;}
.score-num-inp{flex:1;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;
  color:var(--text);font-size:18px;text-align:center;outline:none;font-weight:800;font-family:'Nunito',sans-serif;}
.score-num-inp:focus{border-color:var(--accent);}
.save-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#3055cc);
  color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;transition:.2s;font-family:'Nunito',sans-serif;}
.save-btn:active{transform:scale(.97);}
.save-btn:disabled{opacity:.35;cursor:default;}
.observer-msg{text-align:center;padding:16px;font-size:13px;color:var(--muted);font-style:italic;}

/* ── HANDOFF ── */
.handoff-card{background:var(--card);border:1px solid rgba(240,192,64,.2);border-radius:18px;padding:15px;}
.handoff-title{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.handoff-desc{font-size:12px;color:var(--muted2);margin-bottom:12px;line-height:1.6;}
.handoff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.handoff-btn{padding:11px 8px;border-radius:11px;background:var(--bg3);border:1.5px solid var(--border);
  color:var(--muted2);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;font-family:'Nunito',sans-serif;}
.handoff-btn:active{transform:scale(.95);border-color:var(--gold);color:var(--gold);}

/* ── ROUND END ── */
.round-end-card{background:linear-gradient(135deg,rgba(240,192,64,.08),var(--card));
  border:1px solid rgba(240,192,64,.3);border-radius:18px;padding:18px;text-align:center;}
.re-icon{font-size:40px;margin-bottom:10px;}
.re-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);margin-bottom:5px;}
.re-sub{font-size:13px;color:var(--muted2);margin-bottom:16px;}
.re-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;}

/* ── HISTORY ── */
.hist-item{padding:12px 0;border-bottom:1px solid var(--border);}
.hist-item:last-child{border-bottom:none;}
.hist-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.hist-round{font-size:11px;color:var(--muted);min-width:30px;font-weight:700;}
.hist-winner{font-size:13px;font-weight:800;color:var(--gold);}
.hist-pts{margin-left:auto;font-family:'Cinzel',serif;font-size:14px;color:var(--accent2);}
.hist-others{font-size:11px;color:var(--muted2);}
.hist-time{font-size:10px;color:var(--muted);margin-top:3px;}
.hist-empty{text-align:center;padding:30px;color:var(--muted);}

/* ── BOTTOM NAV ── */
.bnav{display:flex;border-top:1px solid var(--border);background:rgba(13,16,24,.9);
  backdrop-filter:blur(20px);padding-bottom:var(--safe-bot);flex-shrink:0;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;
  background:none;border:none;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;font-family:'Nunito',sans-serif;transition:.2s;}
.bnav-btn.on{color:var(--accent2);}
.bnav-icon{font-size:20px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--safe-bot) + 80px);left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:10px 20px;
  font-size:13px;font-weight:700;color:var(--text);z-index:200;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SPIN ── */
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:rot .7s linear infinite;margin:40px auto;}
@keyframes rot{to{transform:rotate(360deg);}}

select.inp{appearance:none;-webkit-appearance:none;}
</style>
</head>
<body>
<div class="app" id="APP">

<!-- ══════════ LOBBY ══════════ -->
<div class="page on" id="P-LOBBY">
  <div class="hdr">
    <div class="hdr-logo">🀱</div>
    <div><div class="hdr-title">Okey Yazboz</div><div class="hdr-sub">Online · Çok oyunculu</div></div>
  </div>
  <div class="lobby">
    <div class="lobby-hero">
      <div class="hero-emoji">🎴</div>
      <div class="hero-title">Okey Yazboz</div>
      <div class="hero-sub">Oda oluşturun, herkese kodu gönderin.<br>Herkes kendi telefonundan anlık takip eder.</div>
    </div>

    <div class="sec-card">
      <div class="sec-lbl">Adınız</div>
      <input class="inp" id="my-name" placeholder="Adınızı girin" maxlength="14"/>
    </div>

    <div class="sec-card">
      <div class="sec-lbl">Yeni Oda Oluştur — Oyuncu İsimleri</div>
      <div id="player-inputs"></div>
      <div class="inp-row" style="margin-top:4px;margin-bottom:14px;">
        <span style="font-size:13px;color:var(--muted2);flex:1;">Kazanma / Çıkma puanı:</span>
        <select class="inp" id="win-score" style="width:auto;padding:9px 12px;">
          <option value="101">101</option>
          <option value="151">151</option>
          <option value="201">201</option>
          <option value="301">301</option>
        </select>
      </div>
      <button class="btn btn-gold" onclick="createRoom()">✦ Oda Oluştur</button>
    </div>

    <div class="or-sep">veya mevcut odaya katıl</div>

    <div class="sec-card">
      <div class="sec-lbl">Oda Kodunu Gir</div>
      <input class="inp" id="join-code" placeholder="ABCD" maxlength="6"
        style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:20px;font-weight:800;margin-bottom:11px;"
        oninput="this.value=this.value.toUpperCase()"/>
      <button class="btn btn-blue" onclick="joinRoom()">→ Odaya Katıl</button>
    </div>
  </div>
</div>

<!-- ══════════ GAME ══════════ -->
<div class="page" id="P-GAME">
  <div class="hdr">
    <div class="hdr-logo">🀱</div>
    <div><div class="hdr-title">Okey Yazboz</div><div class="hdr-sub" id="g-sub">—</div></div>
    <div class="room-badge" id="g-room-badge" onclick="copyCode()">—</div>
  </div>
  <div class="status-bar" id="g-status">
    <div class="pulse live"></div>
    <span style="color:var(--muted2);">Yazboz:</span>
    <span class="status-writer" id="g-writer">—</span>
    <span style="margin-left:auto;font-size:11px;color:var(--muted);" id="g-round">El 1</span>
  </div>

  <!-- SCORE TAB -->
  <div class="page on" id="TAB-score">
    <div class="game-body" id="score-body"></div>
  </div>

  <!-- HISTORY TAB -->
  <div class="page" id="TAB-hist">
    <div class="game-body" id="hist-body"></div>
  </div>

  <div class="bnav">
    <button class="bnav-btn on" id="nb-score" onclick="tab('score')"><span class="bnav-icon">📊</span>SKOR</button>
    <button class="bnav-btn" id="nb-hist" onclick="tab('hist')"><span class="bnav-icon">📜</span>GEÇMİŞ</button>
    <button class="bnav-btn" id="nb-exit" onclick="exitGame()"><span class="bnav-icon">🚪</span>ÇIKIŞ</button>
  </div>
</div>

</div>
<div class="toast" id="TOAST"></div>

<script>
/* ══════════ STATE ══════════ */
let G=null, myName='', roomCode='', amWriter=false, curTab='score', pollTmr=null;
let selWin=null, toastTmr=null;

/* ══════════ STORAGE ══════════ */
async function sGet(k){
  try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch{return null;}
}
async function sSet(k,v){
  try{await window.storage.set(k,JSON.stringify(v),true);return true;}catch{return false;}
}
function genCode(){return Math.random().toString(36).slice(2,6).toUpperCase();}

/* ══════════ BUILD LOBBY ══════════ */
(function buildInputs(){
  const d=document.getElementById('player-inputs');
  for(let i=0;i<5;i++)
    d.innerHTML+=`<div class="inp-row"><div class="inp-num">${i+1}</div>
      <input class="inp" id="pn${i}" placeholder="Oyuncu ${i+1}" maxlength="12" style="flex:1;"/></div>`;
})();

/* ══════════ CREATE ══════════ */
async function createRoom(){
  myName=(document.getElementById('my-name').value.trim());
  if(!myName){toast('Adınızı girin');return;}
  const players=[];
  for(let i=0;i<5;i++){
    const v=document.getElementById('pn'+i).value.trim();
    players.push(v||'Oyuncu '+(i+1));
  }
  const dup=players.findIndex((p,i)=>players.indexOf(p)!==i);
  if(dup>=0){toast('Oyuncu isimleri tekrar etmemeli');return;}
  const winScore=parseInt(document.getElementById('win-score').value)||101;
  const code=genCode();
  const state={code,players,winScore,
    scores:players.map(()=>0),
    bench:players[4], writer:players[0],
    round:1, history:[], ts:Date.now()};
  if(!await sSet('okey:'+code,state)){toast('Bağlantı hatası');return;}
  G=state; roomCode=code; amWriter=true;
  enterGame();
}

/* ══════════ JOIN ══════════ */
async function joinRoom(){
  myName=(document.getElementById('my-name').value.trim());
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!myName){toast('Adınızı girin');return;}
  if(code.length<4){toast('Geçerli kod girin');return;}
  const state=await sGet('okey:'+code);
  if(!state){toast('Oda bulunamadı: '+code);return;}
  G=state; roomCode=code;
  amWriter=(myName===G.writer);
  enterGame();
}

/* ══════════ ENTER GAME ══════════ */
function enterGame(){
  show('P-GAME');
  renderAll();
  startPoll();
}
function exitGame(){
  clearInterval(pollTmr);
  G=null; roomCode=''; amWriter=false; selWin=null;
  show('P-LOBBY');
}
function show(id){
  ['P-LOBBY','P-GAME'].forEach(p=>document.getElementById(p).classList.toggle('on',p===id));
}

/* ══════════ POLL ══════════ */
function startPoll(){
  clearInterval(pollTmr);
  pollTmr=setInterval(async()=>{
    if(!roomCode)return;
    const fresh=await sGet('okey:'+roomCode);
    if(!fresh||fresh.ts===G.ts)return;
    G=fresh; amWriter=(myName===G.writer);
    renderAll();
  },2500);
}

/* ══════════ TABS ══════════ */
function tab(t){
  curTab=t;
  document.getElementById('TAB-score').classList.toggle('on',t==='score');
  document.getElementById('TAB-hist').classList.toggle('on',t==='hist');
  document.getElementById('nb-score').classList.toggle('on',t==='score');
  document.getElementById('nb-hist').classList.toggle('on',t==='hist');
  renderAll();
}

/* ══════════ RENDER ══════════ */
function renderAll(){
  if(!G)return;
  document.getElementById('g-sub').textContent=`Oda: ${G.code} · ${G.players.length} oyuncu`;
  document.getElementById('g-room-badge').textContent=G.code;
  document.getElementById('g-writer').textContent=G.writer;
  document.getElementById('g-round').textContent=`El ${G.round}`;
  renderScore();
  if(curTab==='hist')renderHist();
}

function renderScore(){
  const sb=document.getElementById('score-body');
  if(!sb)return;

  // Scoreboard rows
  const rows=G.players.map((p,i)=>{
    const s=G.scores[i];
    const bust=s>=G.winScore;
    const isWriter=p===G.writer;
    const isBench=p===G.bench;
    const cls=[
      'score-row',
      isWriter?'is-writer':'',
      isBench?'is-bench':'',
      bust?'busted':''
    ].filter(Boolean).join(' ');
    const scoreClass='sc-score'+(bust?' red':s===0&&G.round>1?' gold':'');
    const badges=[];
    if(isWriter)badges.push(`<span class="badge b-writer">✍ Yazboz</span>`);
    if(isBench)badges.push(`<span class="badge b-bench">⏸ Yedek</span>`);
    else if(!isWriter)badges.push(`<span class="badge b-playing">● Oynuyor</span>`);
    if(bust)badges.push(`<span class="badge b-bust">Çıktı</span>`);
    return `<div class="${cls}">
      <div class="sc-left">
        <div class="sc-name">${p}</div>
        <div class="sc-badges">${badges.join('')}</div>
      </div>
      <div class="sc-mid">|</div>
      <div class="sc-right">
        <div class="${scoreClass}">${s}</div>
        <div class="sc-target">/ ${G.winScore}</div>
      </div>
    </div>`;
  }).join('');

  // Check busted players (reached win score)
  const busted=G.players.filter((p,i)=>G.scores[i]>=G.winScore&&p!==G.bench);
  let roundEndHtml='';
  if(busted.length){
    roundEndHtml=`<div class="round-end-card">
      <div class="re-icon">🏆</div>
      <div class="re-title">El Bitti!</div>
      <div class="re-sub">${busted.join(', ')} — ${G.winScore} puana ulaştı</div>
      ${amWriter?`<div class="re-btns">
        <button class="btn btn-ghost" style="padding:11px;" onclick="newRound()">→ Yeni El</button>
        <button class="btn btn-blue" style="padding:11px;" onclick="resetGame()">↺ Yeni Oyun</button>
      </div>`:`<p style="font-size:12px;color:var(--muted);">${G.writer} yeni el başlatacak…</p>`}
    </div>`;
  }

  // Quick add
  let qaHtml='';
  if(amWriter&&!busted.length){
    const playersNoBench=G.players.filter(p=>p!==G.bench);
    const btnGrid=playersNoBench.map(p=>{
      const id='qb_'+p.replace(/\W/g,'_');
      return `<button class="qa-btn${selWin===p?' sel':''}" id="${id}" onclick="pickWin('${p}')">${p}</button>`;
    }).join('');
    qaHtml=`<div class="qa-card">
      <div class="qa-title">Sonuç Ekle</div>
      <div class="qa-subtitle">Kim kazandı?</div>
      <div class="qa-grid" id="qa-grid">${btnGrid}</div>
      <div class="score-row-inp">
        <label>El Puanı:</label>
        <input class="score-num-inp" type="number" id="el-puan" placeholder="0" min="0" max="999" inputmode="numeric"/>
      </div>
      <button class="save-btn" id="save-btn" onclick="saveRound()" ${selWin?'':'disabled'}>Kaydet</button>
    </div>`;
  } else if(!amWriter&&!busted.length){
    qaHtml=`<div class="qa-card"><div class="observer-msg">✍ Sadece <strong style="color:var(--gold)">${G.writer}</strong> sonuç girebilir.</div></div>`;
  }

  // Handoff (only writer sees)
  let handoffHtml='';
  if(amWriter){
    const others=G.players.filter(p=>p!==myName);
    handoffHtml=`<div class="handoff-card">
      <div class="handoff-title">✦ Yazboz Devret</div>
      <div class="handoff-desc">Masadan kalkan kişi seçilir. Seçilen kişi yazboz'u devralır ve tüm ekranlar güncellenir.</div>
      <div class="handoff-grid">${others.map(p=>`<button class="handoff-btn" onclick="handoff('${p}')">${p}</button>`).join('')}</div>
    </div>`;
  }

  sb.innerHTML=`
    <div class="score-card">
      <div class="score-title">SKOR TABLOSU · EL ${G.round} · / ${G.winScore}</div>
      <div>${rows}</div>
    </div>
    ${roundEndHtml}
    ${qaHtml}
    ${handoffHtml}
  `;
}

function renderHist(){
  const hb=document.getElementById('hist-body');
  if(!hb||!G)return;
  const hist=G.history||[];
  if(!hist.length){hb.innerHTML=`<div class="score-card" style="padding:20px;"><div class="hist-empty">Henüz kayıtlı el yok</div></div>`;return;}
  const items=[...hist].reverse().map((h,ri)=>{
    const idx=hist.length-ri;
    const othersStr=(h.others||[]).map(o=>`${o.name}: +${o.score}`).join(' · ');
    return `<div class="hist-item">
      <div class="hist-top">
        <span class="hist-round">El ${h.round}</span>
        <span class="hist-winner">🏆 ${h.winner}</span>
        <span class="hist-pts">+${h.winnerScore}</span>
      </div>
      <div class="hist-others">${othersStr}</div>
      <div class="hist-time">${h.ts} · Yazboz: ${h.writtenBy}</div>
    </div>`;
  }).join('');
  hb.innerHTML=`<div class="score-card" style="padding:14px;">
    <div class="hist-top" style="margin-bottom:10px;">
      <span style="font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:700;">El Geçmişi</span>
      <span class="hist-pts" style="font-size:11px;color:var(--muted);">${hist.length} el</span>
    </div>
    ${items}
  </div>`;
}

/* ══════════ ACTIONS ══════════ */
function pickWin(p){
  selWin=p;
  document.querySelectorAll('.qa-btn').forEach(b=>b.classList.remove('sel'));
  const btn=document.getElementById('qb_'+p.replace(/\W/g,'_'));
  if(btn)btn.classList.add('sel');
  const sb=document.getElementById('save-btn');
  if(sb)sb.disabled=false;
}

async function saveRound(){
  if(!selWin)return;
  const pts=parseInt(document.getElementById('el-puan').value)||0;

  const fresh=await sGet('okey:'+roomCode);
  if(!fresh){toast('Bağlantı hatası');return;}
  const g=fresh;

  // Record history entry
  const others=g.players
    .filter(p=>p!==selWin&&p!==g.bench)
    .map(p=>({name:p,score:pts}));// others each get +pts

  g.history.push({
    round:g.round,
    winner:selWin,
    winnerScore:0,// winner stays same
    others,
    writtenBy:g.writer,
    ts:new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})
  });

  // Update scores: loser players (not winner, not bench) each +pts
  g.players.forEach((p,i)=>{
    if(p===g.bench||p===selWin)return;
    g.scores[i]=(g.scores[i]||0)+pts;
  });

  g.ts=Date.now();
  await sSet('okey:'+roomCode,g);
  G=g; selWin=null;
  toast(`✓ Kaydedildi — ${G.writer} yazdı`);
  renderAll();
}

async function newRound(){
  const fresh=await sGet('okey:'+roomCode);
  if(!fresh)return;
  fresh.round++;
  // Rotation: writer goes to bench, bench comes in, new writer = next player
  const oldWriter=fresh.writer;
  const oldBench=fresh.bench;
  const playersExBench=fresh.players.filter(p=>p!==oldBench);
  const writerIdx=playersExBench.indexOf(oldWriter);
  const newWriter=playersExBench[(writerIdx+1)%playersExBench.length];
  fresh.bench=oldWriter;
  fresh.writer=newWriter;
  fresh.ts=Date.now();
  await sSet('okey:'+roomCode,fresh);
  G=fresh; amWriter=(myName===G.writer);
  toast(`Yeni el! Yazboz: ${G.writer}`);
  renderAll();
}

async function resetGame(){
  if(!confirm('Tüm puanlar sıfırlanacak. Emin misiniz?'))return;
  const fresh=await sGet('okey:'+roomCode);
  if(!fresh)return;
  fresh.scores=fresh.players.map(()=>0);
  fresh.round=1;fresh.history=[];fresh.ts=Date.now();
  await sSet('okey:'+roomCode,fresh);
  G=fresh;
  toast('Yeni oyun başladı!');
  renderAll();
}

async function handoff(newWriter){
  if(!confirm(`Yazboz'u ${newWriter}'a devret?`))return;
  const fresh=await sGet('okey:'+roomCode);
  if(!fresh)return;
  fresh.writer=newWriter; fresh.ts=Date.now();
  await sSet('okey:'+roomCode,fresh);
  G=fresh; amWriter=false;
  toast(`Yazboz ${newWriter}'a devredildi`);
  renderAll();
}

function copyCode(){
  if(!roomCode)return;
  navigator.clipboard&&navigator.clipboard.writeText(roomCode);
  toast('Oda kodu kopyalandı: '+roomCode);
}

/* ══════════ TOAST ══════════ */
function toast(msg){
  const t=document.getElementById('TOAST');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.classList.remove('show'),2600);
}
</script>
